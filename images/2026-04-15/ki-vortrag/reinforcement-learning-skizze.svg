<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="70" y="90" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111">Reinforcement Learning, einfache Skizze</text>
  <text x="70" y="130" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#444">Agent probiert Handlungen aus, bekommt Belohnung und verbessert sein Verhalten</text>

  <defs>
    <marker id="arrowDark" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect x="150" y="250" width="250" height="150" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="240" y="315" font-family="Arial" font-size="34" font-weight="700" fill="#1e3a8a">Agent</text>
  <text x="190" y="355" font-family="Arial" font-size="22" fill="#1e3a8a">trifft Entscheidung</text>

  <rect x="880" y="250" width="250" height="150" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="940" y="315" font-family="Arial" font-size="34" font-weight="700" fill="#166534">Umwelt</text>
  <text x="905" y="355" font-family="Arial" font-size="22" fill="#166534">reagiert darauf</text>

  <line x1="400" y1="295" x2="880" y2="295" stroke="#334155" stroke-width="6" marker-end="url(#arrowDark)"/>
  <text x="560" y="275" font-family="Arial" font-size="24" font-weight="700" fill="#334155">Aktion</text>

  <line x1="880" y1="355" x2="400" y2="355" stroke="#16a34a" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <text x="540" y="390" font-family="Arial" font-size="24" font-weight="700" fill="#16a34a">Belohnung + neuer Zustand</text>

  <circle cx="640" cy="520" r="85" fill="#fff7ed" stroke="#f59e0b" stroke-width="4"/>
  <text x="582" y="505" font-family="Arial" font-size="28" font-weight="700" fill="#92400e">Lernen</text>
  <text x="555" y="540" font-family="Arial" font-size="20" fill="#92400e">Was war gut?</text>

  <path d="M310 410 C340 500, 430 560, 555 560" fill="none" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrowDark)"/>
  <path d="M725 560 C850 560, 940 500, 970 410" fill="none" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrowDark)"/>

  <rect x="80" y="600" width="1120" height="70" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="120" y="643" font-family="Arial" font-size="24" fill="#111">Idee: Durch Versuch und Irrtum lernt der Agent, Handlungen mit hoher Belohnung häufiger zu wählen.</text>
</svg>