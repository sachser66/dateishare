<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="70" y="90" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#111">Backpropagation, einfache Skizze</text>
  <text x="70" y="130" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#444">Vorwärts: Eingabe → versteckte Schicht → Ausgabe | Rückwärts: Fehler zurück, Gewichte anpassen</text>
  <circle cx="220" cy="240" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <circle cx="220" cy="360" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <circle cx="220" cy="480" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="170" y="565" font-family="Arial" font-size="24" fill="#111">Eingaben</text>
  <circle cx="580" cy="200" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <circle cx="580" cy="320" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <circle cx="580" cy="440" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <circle cx="580" cy="560" r="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="495" y="625" font-family="Arial" font-size="24" fill="#111">Versteckte Schicht</text>
  <circle cx="960" cy="320" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <circle cx="960" cy="440" r="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="915" y="520" font-family="Arial" font-size="24" fill="#111">Ausgabe</text>
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="248" y1="240" x2="552" y2="200"/>
    <line x1="248" y1="240" x2="552" y2="320"/>
    <line x1="248" y1="240" x2="552" y2="440"/>
    <line x1="248" y1="240" x2="552" y2="560"/>
    <line x1="248" y1="360" x2="552" y2="200"/>
    <line x1="248" y1="360" x2="552" y2="320"/>
    <line x1="248" y1="360" x2="552" y2="440"/>
    <line x1="248" y1="360" x2="552" y2="560"/>
    <line x1="248" y1="480" x2="552" y2="200"/>
    <line x1="248" y1="480" x2="552" y2="320"/>
    <line x1="248" y1="480" x2="552" y2="440"/>
    <line x1="248" y1="480" x2="552" y2="560"/>
    <line x1="608" y1="200" x2="930" y2="320"/>
    <line x1="608" y1="200" x2="930" y2="440"/>
    <line x1="608" y1="320" x2="930" y2="320"/>
    <line x1="608" y1="320" x2="930" y2="440"/>
    <line x1="608" y1="440" x2="930" y2="320"/>
    <line x1="608" y1="440" x2="930" y2="440"/>
    <line x1="608" y1="560" x2="930" y2="320"/>
    <line x1="608" y1="560" x2="930" y2="440"/>
  </g>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <line x1="120" y1="160" x2="1030" y2="160" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <text x="430" y="145" font-family="Arial" font-size="24" font-weight="700" fill="#2563eb">Vorwärts rechnen</text>
  <path d="M1000 610 C900 660, 650 660, 520 640 C380 620, 240 610, 130 585" fill="none" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed)"/>
  <text x="640" y="690" font-family="Arial" font-size="24" font-weight="700" fill="#dc2626">Fehler zurückgeben und Gewichte anpassen</text>
  <rect x="1030" y="250" width="190" height="90" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
  <text x="1060" y="290" font-family="Arial" font-size="24" font-weight="700" fill="#92400e">Fehler</text>
  <text x="1055" y="322" font-family="Arial" font-size="20" fill="#92400e">Soll vs. Ist</text>
  <rect x="70" y="610" width="420" height="64" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="95" y="650" font-family="Arial" font-size="22" fill="#111">Idee: Netz lernt, indem es seinen Fehler rückwärts nutzt.</text>
</svg>